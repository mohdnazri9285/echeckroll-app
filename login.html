<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCheckroll - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            background: #1b5e20;
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-header h1 { font-size: 28px; margin-bottom: 5px; }
        .login-header p { opacity: 0.9; font-size: 14px; }
        .login-body { padding: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2e7d32;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover { background: #1b5e20; }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .demo-info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 13px;
        }
        .demo-info p { margin-bottom: 5px; }
        .demo-info code {
            background: #e0e0e0;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🌴 eCheckroll</h1>
            <p>Sistem Pengiraan Gaji Ladang</p>
        </div>
        <div class="login-body">
            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>No Kakitangan</label>
                    <input type="text" id="noKakitangan" placeholder="Contoh: 2401234" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="btnText">Log Masuk</span>
                    <span id="btnLoading" style="display: none;">⏳ Log Masuk...</span>
                </button>
            </form>

            <div class="demo-info">
                <p><strong>🔑 Demo Login:</strong></p>
                <p>FS: <code>2401234</code> | AFC: <code>2401240</code> | FC: <code>2401242</code></p>
                <p>Password: <code>init1234</code></p>
            </div>
        </div>
    </div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
  
  const SUPABASE_URL = 'https://pkoqxybumxevmcnukiye.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrb3F4eWJ1bXhldm1jbnVraXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzYxMDUsImV4cCI6MjA5MTgxMjEwNX0.OLcQrto5pL9o13NSaLcNFQKmJj6Z9wMsSful6NCjols'
  
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
  
  const form = document.getElementById('loginForm')
  const errorDiv = document.getElementById('errorMessage')
  const btnText = document.getElementById('btnText')
  const btnLoading = document.getElementById('btnLoading')
  const loginBtn = document.getElementById('loginBtn')
  
  // Check if already logged in
  const savedUser = localStorage.getItem('echeckroll_user')
  if (savedUser) {
    const user = JSON.parse(savedUser)
    if (user.peranan === 'admin') {
      window.location.href = 'admin-users.html'
    } else {
      window.location.href = 'dashboard.html'
    }
  }
  
  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    
    const noKakitangan = document.getElementById('noKakitangan').value.trim()
    const password = document.getElementById('password').value
    
    btnText.style.display = 'none'
    btnLoading.style.display = 'inline'
    loginBtn.disabled = true
    errorDiv.style.display = 'none'
    
    try {
      const email = `${noKakitangan}@echeckroll.local`
      
      console.log('Attempting login:', email)
      
      // 1. Login guna Supabase Auth
      const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      })
      
      if (authError) {
        console.error('Auth error:', authError)
        throw new Error('No Kakitangan atau Password salah')
      }
      
      console.log('Auth success:', authData.user.id)
      
      // 2. Dapatkan maklumat user dari table users
      const { data: userData, error: userError } = await supabase
        .from('users')
        .select('*, wilayah(nama), rancangan(nama), negeri(nama)')
        .eq('auth_id', authData.user.id)
        .single()
      
      console.log('User data query result:', { userData, userError })
      
      if (userError) {
        console.error('User fetch error:', userError)
        await supabase.auth.signOut()
        throw new Error('Akaun tidak dijumpai dalam table users. Sila hubungi admin.')
      }
      
      if (!userData) {
        await supabase.auth.signOut()
        throw new Error('Data pengguna tidak lengkap')
      }
      
      console.log('User found:', userData.nama_petugas, userData.peranan)
      
      // 3. Simpan user data
      const sessionData = {
        id: userData.id,
        nama: userData.nama_petugas,
        no_kakitangan: userData.no_kakitangan,
        peranan: userData.peranan,
        wilayah_id: userData.wilayah_id,
        rancangan_id: userData.rancangan_id,
        negeri_id: userData.negeri_id,
        wilayah_nama: userData.wilayah?.nama,
        rancangan_nama: userData.rancangan?.nama,
        negeri_nama: userData.negeri?.nama
      }
      
      localStorage.setItem('echeckroll_user', JSON.stringify(sessionData))
      console.log('Session saved, redirecting...')
      
      // 4. Redirect
      if (userData.peranan === 'admin') {
        window.location.href = 'admin-users.html'
      } else {
        window.location.href = 'dashboard.html'
      }
      
    } catch (error) {
      console.error('Login error:', error)
      errorDiv.textContent = error.message
      errorDiv.style.display = 'block'
      btnText.style.display = 'inline'
      btnLoading.style.display = 'none'
      loginBtn.disabled = false
    }
  })
</script>
</body>
</html>
