<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCheckroll - Kumpulan Kerja</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f5f5f5; }
        .navbar {
            background: #1b5e20;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 22px; }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { color: white; text-decoration: none; }
        .btn-logout {
            background: #c62828;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h2 { color: #333; }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-primary { background: #2e7d32; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-danger { background: #c62828; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .groups-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .group-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .group-title { font-size: 18px; font-weight: 600; color: #1b5e20; }
        .group-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .member-list {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 15px;
        }
        .member-item {
            padding: 6px 0;
            font-size: 14px;
            border-bottom: 1px dashed #eee;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .member-count {
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 5px;
        }
        .group-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-btn {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .worker-select {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
        }
        .worker-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
        }
        .worker-option input { width: auto; }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }
        .loading { text-align: center; padding: 50px; color: #666; }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #666;
            background: white;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🌴 eCheckroll - Kumpulan Kerja</h1>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="workers.html">Pekerja</a>
            <a href="incentives.html">Insentif</a>
            <a href="work-groups.html">Kumpulan</a>
        </div>
        <button class="btn-logout" onclick="logout()">Log Keluar</button>
    </div>

    <div class="container">
        <div class="header">
            <h2>👥 Kumpulan Kerja <span id="rancanganName"></span></h2>
            <button class="btn btn-primary" onclick="openModal()">+ Cipta Kumpulan Baru</button>
        </div>

        <div id="groupsContainer" class="groups-container">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <!-- Modal Create/Edit Group -->
    <div class="modal" id="groupModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Cipta Kumpulan Kerja</h3>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="groupForm">
                <input type="hidden" id="groupId">
                <div class="form-group">
                    <label>Nama Kumpulan *</label>
                    <input type="text" id="namaKumpulan" placeholder="Contoh: Harvesting Blok 16" required>
                </div>
                <div class="form-group">
                    <label>Hari Minggu *</label>
                    <select id="hariMinggu" required>
                        <option value="">Pilih Hari</option>
                        <option value="ISNIN">ISNIN</option>
                        <option value="SELASA">SELASA</option>
                        <option value="RABU">RABU</option>
                        <option value="KHAMIS">KHAMIS</option>
                        <option value="JUMAAT">JUMAAT</option>
                        <option value="SABTU">SABTU</option>
                        <option value="AHAD">AHAD</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pilih Pekerja (AKTIF sahaja)</label>
                    <div class="worker-select" id="workerSelect">
                        <div style="text-align:center; padding:20px;">Loading...</div>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://pkoqxybumxevmcnukiye.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrb3F4eWJ1bXhldm1jbnVraXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzYxMDUsImV4cCI6MjA5MTgxMjEwNX0.OLcQrto5pL9o13NSaLcNFQKmJj6Z9wMsSful6NCjols'

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        const savedUser = localStorage.getItem('echeckroll_user')
        if (!savedUser) window.location.href = 'login.html'
        const user = JSON.parse(savedUser)
        const rancanganId = user.rancangan_id

        let allWorkers = []
        let currentGroups = []

        document.getElementById('rancanganName').textContent = `(${user.rancangan_nama || ''})`

        window.logout = async () => {
            await supabase.auth.signOut()
            localStorage.removeItem('echeckroll_user')
            window.location.href = 'login.html'
        }

        async function loadWorkers() {
            const { data } = await supabase
                .from('workers')
                .select('id, nama, no_pekerja')
                .eq('rancangan_id', rancanganId)
                .eq('status', 'AKTIF')
                .order('nama')
            allWorkers = data || []
        }

        async function loadGroups() {
            const container = document.getElementById('groupsContainer')
            container.innerHTML = '<div class="loading">Loading...</div>'

            const { data: groups, error } = await supabase
                .from('work_groups')
                .select('*')
                .eq('rancangan_id', rancanganId)
                .order('created_at', { ascending: false })

            if (error) {
                container.innerHTML = `<div class="loading">Error: ${error.message}</div>`
                return
            }

            currentGroups = groups || []

            if (currentGroups.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Tiada kumpulan kerja. Klik "Cipta Kumpulan Baru".</div>'
                return
            }

            // Load members for each group
            const groupIds = currentGroups.map(g => g.id)
            const { data: members } = await supabase
                .from('work_group_members')
                .select('work_group_id, worker_id, workers(nama, no_pekerja)')
                .in('work_group_id', groupIds)

            const membersByGroup = {}
            members?.forEach(m => {
                if (!membersByGroup[m.work_group_id]) membersByGroup[m.work_group_id] = []
                membersByGroup[m.work_group_id].push(m.workers)
            })

            container.innerHTML = currentGroups.map(group => {
                const groupMembers = membersByGroup[group.id] || []
                const memberCount = groupMembers.length

                return `
                    <div class="group-card">
                        <div class="group-header">
                            <span class="group-title">${group.nama_kumpulan}</span>
                            <span class="group-badge">🗓️ ${group.hari_minggu}</span>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <strong>👤 Ahli Kumpulan</strong> <span class="member-count">${memberCount} orang</span>
                        </div>
                        <div class="member-list">
                            ${groupMembers.length > 0
                                ? groupMembers.map(w => `
                                    <div class="member-item">
                                        <span>👨‍🌾</span>
                                        <span>${w.nama}</span>
                                        <span style="color:#999; font-size:12px;">${w.no_pekerja}</span>
                                    </div>
                                `).join('')
                                : '<div class="member-item" style="color:#999;">Tiada ahli</div>'
                            }
                        </div>
                        <div class="group-actions">
                            <button class="action-btn btn-info" onclick="editGroup('${group.id}')">✏️ Edit</button>
                            <button class="action-btn btn-danger" onclick="deleteGroup('${group.id}')">🗑️ Padam</button>
                        </div>
                    </div>
                `
            }).join('')
        }

        window.openModal = () => {
            document.getElementById('modalTitle').textContent = 'Cipta Kumpulan Kerja'
            document.getElementById('groupForm').reset()
            document.getElementById('groupId').value = ''
            renderWorkerSelect([])
            document.getElementById('groupModal').style.display = 'flex'
        }

        window.closeModal = () => {
            document.getElementById('groupModal').style.display = 'none'
        }

        function renderWorkerSelect(selectedIds = []) {
            const container = document.getElementById('workerSelect')

            if (allWorkers.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Tiada pekerja AKTIF</div>'
                return
            }

            container.innerHTML = allWorkers.map(w => `
                <div class="worker-option">
                    <input type="checkbox" name="worker" value="${w.id}" ${selectedIds.includes(w.id) ? 'checked' : ''}>
                    <span>${w.nama}</span>
                    <span style="color:#999; font-size:12px;">${w.no_pekerja}</span>
                </div>
            `).join('')
        }

        window.editGroup = async (id) => {
            const group = currentGroups.find(g => g.id === id)
            if (!group) return

            // Get existing members
            const { data: members } = await supabase
                .from('work_group_members')
                .select('worker_id')
                .eq('work_group_id', id)

            const selectedIds = members?.map(m => m.worker_id) || []

            document.getElementById('modalTitle').textContent = 'Edit Kumpulan Kerja'
            document.getElementById('groupId').value = group.id
            document.getElementById('namaKumpulan').value = group.nama_kumpulan
            document.getElementById('hariMinggu').value = group.hari_minggu
            renderWorkerSelect(selectedIds)
            document.getElementById('groupModal').style.display = 'flex'
        }

        window.deleteGroup = async (id) => {
            if (!confirm('Padam kumpulan ini?')) return

            const { error } = await supabase.from('work_groups').delete().eq('id', id)
            if (error) alert('Gagal padam: ' + error.message)
            else loadGroups()
        }

        document.getElementById('groupForm').addEventListener('submit', async (e) => {
            e.preventDefault()

            const id = document.getElementById('groupId').value
            const namaKumpulan = document.getElementById('namaKumpulan').value
            const hariMinggu = document.getElementById('hariMinggu').value

            const selectedWorkers = Array.from(document.querySelectorAll('input[name="worker"]:checked')).map(cb => cb.value)

            let groupId = id

            if (id) {
                // Update group
                await supabase.from('work_groups').update({ nama_kumpulan: namaKumpulan, hari_minggu: hariMinggu }).eq('id', id)

                // Delete old members
                await supabase.from('work_group_members').delete().eq('work_group_id', id)
            } else {
                // Create new group
                const { data, error } = await supabase.from('work_groups').insert({
                    rancangan_id: rancanganId,
                    nama_kumpulan: namaKumpulan,
                    hari_minggu: hariMinggu
                }).select('id').single()

                if (error) {
                    alert('Gagal cipta: ' + error.message)
                    return
                }
                groupId = data.id
            }

            // Insert members
            if (selectedWorkers.length > 0) {
                const members = selectedWorkers.map(worker_id => ({ work_group_id: groupId, worker_id }))
                await supabase.from('work_group_members').insert(members)
            }

            closeModal()
            loadGroups()
        })

        // Initialize
        await loadWorkers()
        loadGroups()
    </script>
</body>
</html>
