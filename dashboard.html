<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCheckroll - Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; }
        .navbar {
            background: #1b5e20;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { font-size: 22px; }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .btn-logout {
            background: #c62828;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .welcome-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .welcome-card h2 { color: #333; margin-bottom: 10px; }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .menu-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        .menu-icon { font-size: 40px; margin-bottom: 15px; }
        .menu-card h3 { color: #1b5e20; margin-bottom: 10px; }
        .menu-card p { color: #666; font-size: 14px; }
        .badge {
            background: #2e7d32;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        .coming-soon {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .coming-soon:hover {
            transform: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🌴 eCheckroll</h1>
        <div class="user-info">
            <span id="userName"></span>
            <span id="userRole" class="badge"></span>
            <button class="btn-logout" onclick="logout()">Log Keluar</button>
        </div>
    </div>

    <div class="container">
        <div class="welcome-card">
            <h2>Selamat Datang, <span id="welcomeName"></span>!</h2>
            <p style="color: #666;" id="userDetails"></p>
        </div>

        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://pkoqxybumxevmcnukiye.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBrb3F4eWJ1bXhldm1jbnVraXllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMzYxMDUsImV4cCI6MjA5MTgxMjEwNX0.OLcQrto5pL9o13NSaLcNFQKmJj6Z9wMsSful6NCjols'

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        const savedUser = localStorage.getItem('echeckroll_user')
        if (!savedUser) window.location.href = 'login.html'

        const user = JSON.parse(savedUser)

        document.getElementById('userName').textContent = user.nama
        document.getElementById('welcomeName').textContent = user.nama.split(' ')[0]
        document.getElementById('userDetails').textContent = `No Kakitangan: ${user.no_kakitangan}`

        const roleLabels = {
            'admin': 'Admin',
            'fc': 'Field Controller',
            'afc': 'Assistant Field Controller',
            'fs': 'Field Supervisor'
        }
        document.getElementById('userRole').textContent = roleLabels[user.peranan] || user.peranan

        const menus = {
            admin: [
                { icon: '👥', title: 'Daftar Pengguna', desc: 'Tambah & urus pengguna', url: 'admin-users.html', active: true },
                { icon: '👨‍🌾', title: 'Pekerja Ladang', desc: 'Daftar & urus pekerja', url: 'workers.html', active: true },
                { icon: '👥', title: 'Kumpulan Kerja', desc: 'Urus kumpulan kerja', url: 'work-groups.html', active: true },
                { icon: '💰', title: 'Insentif Bulanan', desc: 'Tetapan kadar insentif', url: 'incentives.html', active: true },
                { icon: '📋', title: 'Kadar Upah', desc: 'Upload jadual kadar upah', url: 'upload-rates.html', active: true },
                { icon: '📊', title: 'Jana Laporan', desc: 'Laporan gaji & tenaga kerja', url: '#', active: false }
            ],
            fs: [
                { icon: '🧮', title: 'eCheckroll', desc: 'Isi data gaji bulanan', url: '#', active: false },
                { icon: '👨‍🌾', title: 'Pekerja Saya', desc: 'Lihat senarai pekerja', url: 'workers.html', active: true },
                { icon: '👥', title: 'Kumpulan Kerja', desc: 'Urus kumpulan kerja', url: 'work-groups.html', active: true },
                { icon: '💰', title: 'Insentif Bulanan', desc: 'Tetapan kadar insentif', url: 'incentives.html', active: true },
                { icon: '📊', title: 'Laporan', desc: 'Lihat laporan', url: '#', active: false }
            ],
            afc: [
                { icon: '✅', title: 'Semak eCheckroll', desc: 'Semak data gaji', url: '#', active: false },
                { icon: '👨‍🌾', title: 'Pekerja Ladang', desc: 'Lihat senarai pekerja', url: 'workers.html', active: true },
                { icon: '👥', title: 'Kumpulan Kerja', desc: 'Lihat kumpulan kerja', url: 'work-groups.html', active: true },
                { icon: '💰', title: 'Insentif Bulanan', desc: 'Tetapan kadar insentif', url: 'incentives.html', active: true },
                { icon: '📋', title: 'Kadar Upah', desc: 'Upload jadual kadar upah', url: 'upload-rates.html', active: true },
                { icon: '📊', title: 'Laporan', desc: 'Lihat laporan', url: '#', active: false }
            ],
            fc: [
                { icon: '✔️', title: 'Sahkan eCheckroll', desc: 'Approve data gaji', url: '#', active: false },
                { icon: '👨‍🌾', title: 'Pekerja Ladang', desc: 'Lihat senarai pekerja', url: 'workers.html', active: true },
                { icon: '👥', title: 'Kumpulan Kerja', desc: 'Lihat kumpulan kerja', url: 'work-groups.html', active: true },
                { icon: '💰', title: 'Insentif Bulanan', desc: 'Tetapan kadar insentif', url: 'incentives.html', active: true },
                { icon: '📋', title: 'Kadar Upah', desc: 'Upload jadual kadar upah', url: 'upload-rates.html', active: true },
                { icon: '📊', title: 'Laporan', desc: 'Lihat laporan', url: '#', active: false }
            ]
        }

        const userMenus = menus[user.peranan] || []
        const menuGrid = document.getElementById('menuGrid')

        userMenus.forEach(menu => {
            const card = document.createElement('div')
            card.className = 'menu-card' + (menu.active ? '' : ' coming-soon')
            card.innerHTML = `
                <div class="menu-icon">${menu.icon}</div>
                <h3>${menu.title}</h3>
                <p>${menu.desc}</p>
                ${!menu.active ? '<span style="color:#999;font-size:12px;">Akan Datang</span>' : ''}
            `
            if (menu.active && menu.url !== '#') {
                card.addEventListener('click', () => window.location.href = menu.url)
            }
            menuGrid.appendChild(card)
        })

        window.logout = async () => {
            await supabase.auth.signOut()
            localStorage.removeItem('echeckroll_user')
            window.location.href = 'login.html'
        }
    </script>
</body>
</html>
